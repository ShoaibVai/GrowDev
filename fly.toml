# Fly.io Configuration for GrowDev Laravel Backend
# https://fly.io/docs/reference/configuration/

app = "growdev-backend"
primary_region = "iad"

[build]
  builder = "heroku"
  buildpacks = ["heroku/php"]

[build.args]
  COMPOSER_VENDOR_DIR = "/app/vendor"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"

[[services]]
  internal_port = 8080
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 256
    soft_limit = 200

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "5s"

[checks]
  [checks.status]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[processes]
  app = "vendor/bin/heroku-php-apache2 public/"
  queue = "php artisan queue:work --sleep=3 --tries=3"
  scheduler = "php artisan schedule:work"

[[mounts]]
  source = "storage_volume"
  destination = "/app/storage"
  processes = ["app"]

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/"
